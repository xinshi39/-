    <!-- Stack（IP形象）— Vanilla JS reimplementation of reactbits Stack-JS-CSS -->
    <script>
    (function initIPStack() {
      const container = document.getElementById('ip-stack');
      if (!container) return;
      const stackContainer = container.querySelector('.stack-container');
      if (!stackContainer) return;

      const cards = [
        {
          image: 'ip/c6d4d88a6b253eb2ce450d731851b7dd.jpg',
          title: 'IP形象',
          description: 'IP形象设计作品'
        },
        {
          image: 'ip/guangxiaobing.jpg',
          title: '光小饼',
          description: 'IP形象角色设计'
        },
        {
          image: 'ip/yuxiaojiao.jpg',
          title: '芋小饺',
          description: 'IP形象角色设计'
        },
        {
          image: 'ip/chaxiaoye.jpg',
          title: '茶小叶',
          description: 'IP形象角色设计'
        }
      ];

      // 配置：对应 reactbits Stack 组件 props
      const SENSITIVITY = 200;        // 拖拽触发回退的阈值
      const AUTOPLAY_DELAY = 3500;    // 自动播放间隔
      const SPRING_EASE = 'cubic-bezier(0.16, 1, 0.3, 1)';
      const FLY_EASE = 'cubic-bezier(0.4, 0, 0.6, 1)';
      const ROTATE_FACTOR = 0.6;      // 拖拽时 rotateX/rotateY 系数
      const MAX_TILT = 60;            // 最大倾斜角度

      let stack = cards.map((c, i) => ({ id: i + 1, data: c }));
      let isPaused = false;
      let isInteracting = false;
      let isDragging = false;
      let startX = 0, startY = 0;
      let currentX = 0, currentY = 0;
      let activePointerId = null;
      let autoplayTimer = null;

      function openLightbox(item) {
        if (!item) return;
        // 延迟查询：此 script 在 lightbox HTML 之前执行，初始化时元素尚不存在
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-image');
        const lightboxTitle = document.getElementById('lightbox-title');
        const lightboxDesc = document.getElementById('lightbox-description');
        if (!lightbox || !lightboxImg) return;
        lightboxImg.src = item.image;
        if (lightboxTitle) lightboxTitle.textContent = item.title || '';
        if (lightboxDesc) lightboxDesc.textContent = item.description || '';
        lightbox.classList.add('active');
      }

      function applyCardTransform(wrap, inner, index, immediate) {
        const total = stack.length;
        const rotateZ = (total - index - 1) * 4;
        const scale = 1 + index * 0.06 - total * 0.06;
        // 用显式 z-index 控制层叠，避免依赖 DOM 顺序（sendToBack 后 DOM 不重排）
        wrap.style.zIndex = String(index + 1);
        inner.style.transition = immediate ? 'none' : 'transform 0.6s ' + SPRING_EASE;
        inner.style.transform = 'rotateZ(' + rotateZ + 'deg) scale(' + scale + ')';
        inner.style.transformOrigin = '90% 90%';
        if (immediate) {
          // 强制重排以应用无过渡的初始状态
          inner.offsetHeight;
          inner.style.transition = 'transform 0.6s ' + SPRING_EASE;
        }
      }

      function reapplyAllCardTransforms() {
        stack.forEach((card, index) => {
          const wrap = stackContainer.querySelector('.card-rotate[data-id="' + card.id + '"]');
          const inner = wrap ? wrap.querySelector('.card') : null;
          if (wrap && inner) applyCardTransform(wrap, inner, index, false);
        });
      }

      function getTopCard() {
        return stack[stack.length - 1];
      }

      function getTopCardElement() {
        const top = getTopCard();
        return top ? stackContainer.querySelector('.card-rotate[data-id="' + top.id + '"]') : null;
      }

      function sendToBack(id) {
        const index = stack.findIndex(c => c.id === id);
        if (index === -1) return;
        const [card] = stack.splice(index, 1);
        stack.unshift(card);
        reapplyAllCardTransforms();
      }

      // 顶部卡片飞出后回到栈底
      function animateSendToBack(card, direction) {
        const wrap = stackContainer.querySelector('.card-rotate[data-id="' + card.id + '"]');
        if (!wrap) {
          sendToBack(card.id);
          return;
        }
        const flyX = direction ? direction.x : currentX * 4;
        const flyY = direction ? direction.y : currentY * 4;
        const flyRotate = (direction ? direction.x : currentX) * 0.1;

        wrap.classList.add('flying');
        wrap.style.transition = 'transform 0.55s ' + FLY_EASE + ', opacity 0.55s ease-out';
        wrap.style.transform = 'translate3d(' + flyX + 'px, ' + flyY + 'px, 0) rotateZ(' + flyRotate + 'deg)';
        wrap.style.opacity = '0';

        setTimeout(() => {
          wrap.classList.remove('flying');
          wrap.style.transition = 'none';
          wrap.style.transform = '';
          wrap.style.opacity = '';
          // 让浏览器记录无变换状态后再恢复过渡
          wrap.offsetHeight;
          sendToBack(card.id);
        }, 560);
      }

      function render() {
        stackContainer.innerHTML = '';
        stack.forEach((card, index) => {
          const wrap = document.createElement('div');
          wrap.className = 'card-rotate';
          wrap.dataset.id = card.id;

          const inner = document.createElement('div');
          inner.className = 'card';

          const img = document.createElement('img');
          img.className = 'card-image';
          img.src = card.data.image;
          img.alt = card.data.title || '';
          img.draggable = false;

          inner.appendChild(img);
          wrap.appendChild(inner);
          stackContainer.appendChild(wrap);

          applyCardTransform(wrap, inner, index, true);
        });
      }

      // 拖拽事件（委托到容器，只响应顶部卡片）
      let suppressClick = false;
      let suppressClickTimer = null;

      function flagSuppressClick() {
        suppressClick = true;
        clearTimeout(suppressClickTimer);
        suppressClickTimer = setTimeout(() => { suppressClick = false; }, 200);
      }

      stackContainer.addEventListener('pointerdown', (e) => {
        if (isDragging) return;
        const topEl = getTopCardElement();
        if (!topEl) return;
        // 仅当点击命中顶部卡片时才启动拖拽
        if (e.target.closest('.card-rotate') !== topEl) return;

        isDragging = true;
        isInteracting = true;
        activePointerId = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        currentX = 0;
        currentY = 0;
        topEl.classList.add('dragging');
        topEl.style.transition = 'none';
        try { topEl.setPointerCapture(e.pointerId); } catch (_) {}
      });

      stackContainer.addEventListener('pointermove', (e) => {
        if (!isDragging || e.pointerId !== activePointerId) return;
        currentX = e.clientX - startX;
        currentY = e.clientY - startY;
        const rotateX = Math.max(-MAX_TILT, Math.min(MAX_TILT, -currentY * ROTATE_FACTOR));
        const rotateY = Math.max(-MAX_TILT, Math.min(MAX_TILT, currentX * ROTATE_FACTOR));
        const topEl = getTopCardElement();
        if (topEl) {
          topEl.style.transform = 'translate3d(' + currentX + 'px, ' + currentY + 'px, 0) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
        }
      });

      function endDrag(e) {
        if (!isDragging) return;
        if (e && e.pointerId !== activePointerId) return;

        const topEl = getTopCardElement();
        const topCard = getTopCard();
        const offset = Math.max(Math.abs(currentX), Math.abs(currentY));

        isDragging = false;
        if (topEl) topEl.classList.remove('dragging');

        // 有显著移动则抑制随后的 click 事件（避免拖拽误触发灯箱）
        if (offset > 8) {
          flagSuppressClick();
        }

        if (offset > SENSITIVITY && topCard) {
          animateSendToBack(topCard);
          setTimeout(() => { isInteracting = false; }, 560);
        } else if (topEl) {
          // 回弹到原位
          topEl.style.transition = 'transform 0.5s ' + SPRING_EASE;
          topEl.style.transform = '';
          setTimeout(() => { isInteracting = false; }, 500);
        } else {
          isInteracting = false;
        }

        currentX = 0;
        currentY = 0;
        activePointerId = null;
      }

      stackContainer.addEventListener('pointerup', endDrag);
      stackContainer.addEventListener('pointercancel', endDrag);

      // 点击顶部卡片打开灯箱（拖拽后会被 suppressClick 抑制）
      stackContainer.addEventListener('click', (e) => {
        if (suppressClick || isDragging) return;
        const topEl = getTopCardElement();
        const topCard = getTopCard();
        if (!topEl || !topCard) return;
        if (e.target.closest('.card-rotate') !== topEl) return;
        openLightbox(topCard.data);
      });

      // 自动播放：定时把顶部卡片送到栈底
      function startAutoplay() {
        if (autoplayTimer) return;
        autoplayTimer = setInterval(() => {
          if (isPaused || isInteracting || isDragging) return;
          if (stack.length <= 1) return;
          const topCard = getTopCard();
          if (!topCard) return;
          isInteracting = true;
          // 向上飞出
          animateSendToBack(topCard, { x: 0, y: -380 });
          setTimeout(() => { isInteracting = false; }, 620);
        }, AUTOPLAY_DELAY);
      }

      function stopAutoplay() {
        if (autoplayTimer) {
          clearInterval(autoplayTimer);
          autoplayTimer = null;
        }
      }

      // 悬停暂停（保留以备未来启用自动播放时使用）
      container.addEventListener('mouseenter', () => { isPaused = true; });
      container.addEventListener('mouseleave', () => { isPaused = false; });

      // 自动播放已关闭：仅手动拖拽 / 点击触发

      render();
    })();
    </script>
